<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a4b8c" />
    <meta name="description" content="FIFA World Cup 2026 世界盃 – schedule, groups, standings, ViuTV free matches" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>World Cup 2026 世界盃</title>
  </head>
  <body>
    <script>
      (function() {
        var redirect = sessionStorage.getItem('redirect')
        if (redirect) {
          sessionStorage.removeItem('redirect')
          var base = '/worldcup2026/'
          var idx = redirect.indexOf(base)
          if (idx !== -1) {
            var path = redirect.substring(idx)
            history.replaceState(null, '', path)
          }
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
